<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, follow">
<title>Page Not Found — Papervale Trees</title>
<meta name="description" content="The page you were looking for could not be found. Browse our tree catalogue or return to the Papervale Trees homepage.">
<link rel="apple-touch-icon" href="assets/brand/apple-touch-icon.png">
<link rel="icon" type="image/x-icon" href="assets/brand/favicon-dark.ico">

<link rel="stylesheet" href="styles.css?v=b2f01c4">
<style>
.not-found {
  min-height: calc(100vh - 200px);
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: var(--sp-section) var(--sp-xl);
}
.not-found-inner { max-width: 560px; }
.not-found-code {
  font-family: var(--font-display);
  font-size: clamp(80px, 15vw, 140px);
  font-weight: 300;
  line-height: 1;
  color: var(--hairline);
  letter-spacing: -4px;
  margin-bottom: var(--sp-lg);
  display: block;
}
.not-found-eyebrow {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--brand-fern);
  display: block;
  margin-bottom: var(--sp-md);
}
.not-found-title {
  font-family: var(--font-display);
  font-size: clamp(28px, 4vw, 40px);
  font-weight: 400;
  color: var(--ink);
  line-height: 1.15;
  margin-bottom: var(--sp-lg);
}
.not-found-title em { font-style: italic; color: var(--brand-forest); }
.not-found-body {
  color: var(--muted);
  font-size: 16px;
  line-height: 1.65;
  margin-bottom: var(--sp-xxl);
}
.not-found-actions {
  display: flex;
  gap: var(--sp-md);
  justify-content: center;
  flex-wrap: wrap;
}
</style>
</head>
<body>
<ukisg-banner></ukisg-banner>
<app-nav></app-nav>

<div class="not-found">
  <div class="not-found-inner">
    <span class="not-found-code">404</span>
    <span class="not-found-eyebrow">Page not found</span>
    <h1 class="not-found-title">This branch seems<br>to have <em>gone missing</em></h1>
    <p class="not-found-body">
      The page you're looking for doesn't exist or may have moved.<br>
      Try browsing our tree catalogue or head back to the homepage.
    </p>
    <div class="not-found-actions">
      <a href="tree-catalogue.html" class="btn-primary">
        Browse the catalogue
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </a>
      <a href="index.html" class="btn-ghost" style="background:var(--surface-card);border:1px solid var(--hairline);color:var(--ink);padding:13px 24px;border-radius:var(--radius-md);font-size:14px;font-weight:600;text-decoration:none;display:inline-flex;align-items:center;gap:8px;">
        Back to home
      </a>
    </div>
  </div>
</div>

<app-footer></app-footer>
<script src="components/app-footer.js"></script>
<script src="components/app-nav.js"></script>
<script src="components/ukisg-banner.js"></script>
<script src="components/shared.js"></script>
</body>
</html>
