<script>
  // ─── SHUFFLE & SUBSET ───
  const gallery = document.getElementById('gallery');
  const galleryItems = Array.from(gallery.querySelectorAll('.masonry-item'));
  for (let i = galleryItems.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [galleryItems[i], galleryItems[j]] = [galleryItems[j], galleryItems[i]];
  }
  gallery.innerHTML = '';
  galleryItems.slice(0, 24).forEach(item => gallery.appendChild(item));

  // ─── LIGHTBOX ───
  const images = Array.from(document.querySelectorAll('.masonry-item img'));
  const lightbox = document.getElementById('lightbox');
  const lightboxImg = document.getElementById('lightboxImg');
  const lightboxCounter = document.getElementById('lightboxCounter');
  const lightboxThumbs = document.getElementById('lightboxThumbs');
  let current = 0;

  // Build thumbnail strip
  images.forEach((img, i) => {
    const thumb = document.createElement('div');
    thumb.className = 'lightbox-thumb';
    thumb.innerHTML = `<img src="${img.src}" alt="">`;
    thumb.addEventListener('click', () => goTo(i));
    lightboxThumbs.appendChild(thumb);
  });

  function updateThumbs() {
    document.querySelectorAll('.lightbox-thumb').forEach((t, i) => {
      t.classList.toggle('active', i === current);
    });
  }

  function goTo(index) {
    current = (index + images.length) % images.length;
    lightboxImg.classList.add('loading');
    const newImg = new Image();
    newImg.onload = () => {
      lightboxImg.src = newImg.src;
      lightboxImg.alt = images[current].alt;
      lightboxImg.classList.remove('loading');
    };
    newImg.src = images[current].src;
    lightboxCounter.textContent = `${current + 1} / ${images.length}`;
    updateThumbs();
  }

  function openLightbox(index) {
    current = index;
    lightboxImg.src = images[current].src;
    lightboxImg.alt = images[current].alt;
    lightboxCounter.textContent = `${current + 1} / ${images.length}`;
    updateThumbs();
    lightbox.classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeLightbox() {
    lightbox.classList.remove('open');
    document.body.style.overflow = '';
  }

  // Open on click
  document.querySelectorAll('.masonry-item').forEach((item, i) => {
    item.addEventListener('click', () => openLightbox(i));
  });

  document.getElementById('lightboxClose').addEventListener('click', closeLightbox);
  document.getElementById('lightboxPrev').addEventListener('click', () => goTo(current - 1));
  document.getElementById('lightboxNext').addEventListener('click', () => goTo(current + 1));

  // Close on backdrop click
  lightbox.addEventListener('click', (e) => {
    if (e.target === lightbox) closeLightbox();
  });

  // Keyboard navigation
  document.addEventListener('keydown', (e) => {
    if (!lightbox.classList.contains('open')) return;
    if (e.key === 'Escape') closeLightbox();
    if (e.key === 'ArrowLeft') goTo(current - 1);
    if (e.key === 'ArrowRight') goTo(current + 1);
  });

  // Swipe support for mobile
  let touchStartX = 0;
  lightbox.addEventListener('touchstart', (e) => { touchStartX = e.changedTouches[0].clientX; }, { passive: true });
  lightbox.addEventListener('touchend', (e) => {
    const diff = touchStartX - e.changedTouches[0].clientX;
    if (Math.abs(diff) > 50) goTo(diff > 0 ? current + 1 : current - 1);
  }, { passive: true });
</script>
