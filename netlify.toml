# Netlify Configuration
# https://docs.netlify.com/configure-builds/file-based-configuration/

[build]
  command = "echo 'Static site - no build required'"
  publish = "."

# Image processing & compression
[build.processing.images]
  compress = true

# ── Block internal folders from public access ────────────────────────────────
[[redirects]]
  from = "/docs/*"
  to = "/"
  status = 404
  force = true

[[redirects]]
  from = "/ecwid-*.json"
  to = "/"
  status = 404
  force = true

[[redirects]]
  from = "/ecwid-*.txt"
  to = "/"
  status = 404
  force = true

# Cache headers for optimal performance

# ── Stylesheets (1 year) ─────────────────────────────────────────────────────
[[headers]]
  for = "/styles.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/trees/product.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── JavaScript components (1 year) ───────────────────────────────────────────
[[headers]]
  for = "/components/**"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── Images and brand assets (1 year) ─────────────────────────────────────────
[[headers]]
  for = "/assets/images/**"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/brand/**"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── Downloadable docs (1 day — updated each season) ──────────────────────────
[[headers]]
  for = "/assets/docs/**"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# ── HTML pages (1 hour — allows content updates to propagate) ────────────────
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/trees/*.html"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "public, max-age=3600"

# ── Vary header (encoding negotiation) ───────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    Vary = "Accept-Encoding"
